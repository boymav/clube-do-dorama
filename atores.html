<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atores e Atrizes de Dorama | Planeta Dorama</title>
  <meta name="description" content="Conheça as maiores estrelas dos doramas coreanos. Biografias, curiosidades e filmografias completas dos seus atores favoritos.">
  
  <style>
    :root {
      --bg: #f8f4ff;
      --accent: #b983ff;
      --accent-dark: #9656ff;
      --card: #ffffff;
      --text: #2d2d2d;
      --sub: #666;
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }
    
    body { 
      margin: 0; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background-color: var(--bg); 
      color: var(--text);
      line-height: 1.6;
    }

    /* Cabeçalho Premium */
    header {
      background: linear-gradient(135deg, #b983ff 0%, #d4b3ff 100%);
      padding: 60px 20px;
      text-align: center;
      color: white;
      border-radius: 0 0 50px 50px;
      box-shadow: 0 10px 30px rgba(185, 131, 255, 0.3);
    }

    header h1 { margin: 0; font-size: 3rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    header p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; font-weight: 300; }
    
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      backdrop-filter: blur(5px);
      font-weight: bold;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .back-btn:hover { background: white; color: var(--accent); }

    /* Grid de Atores */
    .container { max-width: 1200px; margin: -40px auto 60px; padding: 0 20px; }
    
    .grid-atores {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    /* Card Estilizado */
    .card-ator {
      background: var(--card);
      border-radius: 30px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card-ator:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 50px rgba(185, 131, 255, 0.2);
    }

    .foto-wrap {
      width: 100%;
      height: 380px;
      overflow: hidden;
      position: relative;
    }

    .foto-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }

    /* Badge de destaque */
    .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255, 255, 255, 0.9);
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
      color: var(--accent);
      z-index: 2;
    }

    .info-ator {
      padding: 25px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .info-ator h3 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--text);
      font-weight: 700;
    }

    .info-ator p {
      margin: 10px 0 0;
      font-size: 0.95rem;
      color: var(--sub);
      font-style: italic;
    }

    .btn-perfil {
      margin-top: 15px;
      color: var(--accent);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }

    footer { text-align: center; padding: 40px; color: var(--sub); font-size: 0.9rem; }

    @media (max-width: 600px) {
      header h1 { font-size: 2rem; }
      .grid-atores { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Planeta Dorama</a>
  <h1>Estrelas Coreanas</h1>
  <p>Explore o universo dos seus atores e atrizes favoritos</p>
</header>

<div class="container">
  <div class="grid-atores" id="grid-atores">
    </div>
</div>

<footer>
  Planeta Dorama 🌍 — A sua enciclopédia Hallyu.
</footer>

<script src="atores.js"></script>
</body>
</html>
