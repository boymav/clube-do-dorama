<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atores e Atrizes de Dorama | Planeta Dorama</title>
    <style>
        :root { --accent: #b983ff; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3e8ff; margin: 0; padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 40px auto; 
        }
        .card-ator { 
            background: var(--card); 
            border-radius: 20px; 
            overflow: hidden; 
            text-decoration: none; 
            color: #333; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card-ator:hover { transform: translateY(-5px); }
        .foto-wrap { height: 300px; overflow: hidden; }
        .foto-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .info-ator { padding: 15px; text-align: center; }
        .info-ator h3 { margin: 0; color: var(--accent); }
        .info-ator p { font-size: 14px; color: #777; margin-top: 5px; }
        header { text-align: center; margin-bottom: 30px; }
        .back-home { text-decoration: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-home">← Voltar ao Início</a>
    <h1 style="color: #b983ff;">Estrelas do Planeta Dorama</h1>
</header>

<div class="grid" id="grid-atores">
    </div>

<script src="atores.js"></script>
</body>
</html>
